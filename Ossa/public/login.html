<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ossa Dashboard | Login</title>
  <meta name="description" content="Login to your Ossa association account"/>
  <meta name="author" content="Ohene Emmanuel Kwakye"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
  <link rel="stylesheet" href="stlyes/small.css" />
  <link rel="stylesheet" href="stlyes/form.css" />
  <link rel="stylesheet" href="stlyes/large.css" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth@0,99.7;1,99.7&display=swap" rel="stylesheet" />

  <script type="module" src="script/home.js"></script>
  <script type="module" src="script/login.js"></script>
</head>

<body>
    <header class="mobile-header">
        <span class="logo-icon"><i class="fas fa-graduation-cap" aria-hidden="true"> OSSA ADMIN</i></span>
        <button id="menu-bar" aria-label="menu-bar"></button>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-graduation-cap" aria-hidden="true"></i></span>
                <span>OSSA Admin</span>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="#"><i class="fas fa-users"></i> Members</a></li>
                    <li class="nav-separator"></li>
                    <li class="login active">
                        <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="form-container">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your dashboard</p>
            
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required />
                    </div>
                
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required />
                    </div>
                
                    <button type="submit" class="submit-btn">Login</button>

                    <p class="form-footer">Need an account? <a href="register.html">Register here</a></p>
                </form>

                <div id="message-box" class="hidden"></div>
            </div>
        </main>
    </div>
</body>
</html>
